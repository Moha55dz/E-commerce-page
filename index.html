<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClothStore | Premium Clothing Store</title>
    <meta name="description" content="Discover the latest collection of premium clothing at ClothStore. Modern styles, high quality, and fast delivery.">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header id="navbar">
        <nav class="container">
            <div class="logo">
                <a href="index.html">CLOTH<span>STORE</span></a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="#products">Shop</a></li>
                <li class="cart-icon">
                    <a href="cart.html">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cart-count">0</span>
                    </a>
                </li>
            </ul>
            <div class="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </div>
        </nav>
    </header>

    <main>
        <section id="hero">
            <div class="hero-content container">
                <h1>Elevate Your Style</h1>
                <p>Discover our exclusive collection of premium essentials designed for modern life.</p>
                <a href="#products" class="btn btn-primary">Shop Now</a>
            </div>
        </section>

        <section id="products" class="container section">
            <div class="section-header">
                <h2>Featured Products</h2>
            </div>
            <div id="product-grid" class="product-grid">
                <!-- Products will be dynamically rendered here via JS -->
                 <div class="loader"></div>
            </div>
        </section>
    </main>

    <footer id="footer">
        <div class="container footer-content">
            <div class="footer-info">
                <h3>CLOTHSTORE</h3>
                <p>Premium quality for your everyday needs.</p>
            </div>
            <div class="footer-links">
                <h4>Quick Links</h4>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="#products">Shop</a></li>
                    <li><a href="cart.html">Cart</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <!-- JS Scripts -->
    <script src="js/products.js"></script>
    <script src="js/filter.js"></script>
</body>
</html>
