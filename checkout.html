<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | ClothStore</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .checkout-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
        }
        .checkout-form-section {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .order-summary-card {
            background: #f9f9f9;
            padding: 30px;
            border-radius: 12px;
            height: fit-content;
        }
        .summary-title {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        .total-row {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #ddd;
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
        }
        #order-success {
            display: none;
            text-align: center;
            padding: 50px;
        }
        #order-success i {
            font-size: 4rem;
            color: #2ecc71;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <header id="navbar">
        <nav class="container">
            <div class="logo">
                <a href="index.html">CLOTH<span>STORE</span></a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#products">Shop</a></li>
                <li class="cart-icon">
                    <a href="cart.html">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cart-count">0</span>
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="container section">
        <div id="checkout-content">
            <h1 class="page-title">Checkout</h1>
            <div class="checkout-container">
                <div class="checkout-form-section">
                    <form id="checkout-form">
                        <h3>Shipping Information</h3>
                        <div class="form-group">
                            <label for="full-name">Full Name</label>
                            <input type="text" id="full-name" required placeholder="John Doe">
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" required placeholder="john@example.com">
                        </div>
                        <div class="form-group">
                            <label for="address">Address</label>
                            <input type="text" id="address" required placeholder="123 Street Name">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="city">City</label>
                                <input type="text" id="city" required placeholder="New York">
                            </div>
                        </div>

                        <h3 style="margin-top: 30px;">Payment Information</h3>
                        <div class="form-group">
                            <label for="card-num">Card Number</label>
                            <input type="text" id="card-num" required placeholder="1234 5678 9101 1121">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="expiry">Expiry Date</label>
                                <input type="text" id="expiry" required placeholder="MM/YY">
                            </div>
                            <div class="form-group">
                                <label for="cvv">CVV</label>
                                <input type="text" id="cvv" required placeholder="123">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" style="margin-top: 20px;">Place Order</button>
                    </form>
                </div>

                <div class="order-summary-card">
                    <h3 class="summary-title">Order Summary</h3>
                    <div id="checkout-items">
                        <!-- Items rendered via JS -->
                    </div>
                    <div class="total-row">
                        <span>Total</span>
                        <span id="checkout-total">$0.00</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="order-success">
            <i class="fas fa-check-circle"></i>
            <h1>Order Placed Successfully!</h1>
            <p>Thank you for shopping with ClothStore. Your order #<span id="order-id"></span> is being processed.</p>
            <a href="index.html" class="btn btn-primary" style="margin-top: 30px;">Back to Home</a>
        </div>
    </main>

    <footer id="footer">
    </footer>

    <script src="js/products.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
