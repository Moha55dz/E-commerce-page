<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | ClothStore</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header id="navbar">
        <nav class="container">
            <div class="logo">
                <a href="index.html">CLOTH<span>STORE</span></a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#products">Shop</a></li>
                <li class="cart-icon">
                    <a href="cart.html" class="active">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cart-count">0</span>
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="container section">
        <h1 class="page-title">Shopping Cart</h1>
        <div class="cart-container">
            <div id="cart-items" class="cart-items">
                <!-- Cart items dynamically rendered -->
                <p class="empty-msg">Your cart is empty.</p>
            </div>
            <div class="cart-summary">
                <h3>Order Summary</h3>
                <div class="summary-item">
                    <span>Subtotal</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div class="summary-item">
                    <span>Shipping</span>
                    <span>Free</span>
                </div>
                <div class="summary-item total">
                    <span>Total</span>
                    <span id="total-price">$0.00</span>
                </div>
                <a href="checkout.html" class="btn btn-primary w-100">Checkout</a>
            </div>
        </div>
    </main>

    <footer id="footer">
    </footer>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
